name: Publicar posts agendados

on:
  schedule:
    # Roda toda quarta-feira às 11h de Brasília (14h UTC).
    # (Os posts são agendados para quartas; assim o site só faz deploy 1x/semana.)
    - cron: '0 14 * * 3'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub a qualquer momento

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar script de publicação
        run: node scripts/publish-scheduled-posts.js

      - name: Commit e push das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "Sem alterações para commitar." && exit 0
          git commit -m "Publicar posts agendados automaticamente"
          git push
